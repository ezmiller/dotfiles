tmux:
    symbols:
        branch: " "
        hashprefix: ":"
        ahead: ↑
        behind: ↓
        staged: "+"
        conflict: "!"
        modified: "~"
        untracked: "?"
        stashed: "*"
        clean: ✔

    styles:
        clear: "#[fg=default,bg=#313244]"
        state: "#[fg=red,bold]"
        branch: "#[fg=magenta,bold]"
        remote: "#[fg=cyan]"
        divergence: "#[fg=yellow]"
        staged: "#[fg=green,bold]"
        conflict: "#[fg=red,bold]"
        modified: "#[fg=yellow,bold]"
        untracked: "#[fg=blue]"
        stashed: "#[fg=cyan,bold]"
        clean: "#[fg=green,bold]"

    layout: [branch, divergence, " ", flags]

    options:
        branch_max_len: 30
        branch_trim: right
        ellipsis: …
        hide_clean: true
