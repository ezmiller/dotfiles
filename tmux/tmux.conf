# Note: Make sure to run prefix + I in tmux to fetch plugins if
# starting fresh or adding new tpm plugin.

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Catppuccin options
set -g @catppuccin_flavor 'mocha'

# Pane borders with titles (native tmux settings)
set -g pane-border-status top
set -g pane-border-format '#[fg=#cdd6f4,bg=#45475a] #{pane_index}: #{pane_title} #[default]'
set -g pane-border-lines heavy
set -g pane-border-style 'fg=#6c7086'
set -g pane-active-border-style 'fg=#6c7086'

# Enable mouse support (click to select panes, drag to resize, scroll)
set -g mouse on

# Allow passthrough for image support (e.g., pasting images into Claude Code)
set -g allow-passthrough all
set -g set-clipboard on

# Dim text in unfocused panes
set -g window-style 'fg=colour240'
set -g window-active-style 'fg=terminal'

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# A shortcut for clearing buffer history
bind C-k clear-history

# Easy editing of tmux configuration
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"
bind-key M split-window -h "vim ~/.tmux.conf"

# vim-bindings for copying into tmux buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
