# Note: Make sure to run prefix + I in tmux to fetch plugins if
# starting fresh or adding new tpm plugin.

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# catppuccin is loaded manually below (not via TPM) to control option order
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Catppuccin options (must be set before loading catppuccin)
set -g @catppuccin_flavor 'mocha'

# Catppuccin pane border settings
set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_default_text '##{b:pane_current_path}'

# Load catppuccin
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# Override gitmux text (after catppuccin load - uses #{E:} runtime expansion)
set -g @catppuccin_gitmux_text " #(gitmux -cfg ~/.gitmux.conf \"#{pane_current_path}\")"

# Additional pane styling
set -g pane-border-status top
set -g pane-border-lines heavy

# Append gitmux + activity to catppuccin's pane-border-format (after it's built)
set -ga pane-border-format '#[fg=#94e2d5,bg=#313244] 󰊢#[fg=default,bg=#313244]#(gitmux -cfg $HOME/.gitmux.conf "#{pane_current_path}") #[fg=#a6adc8,bg=#313244]- #{pane_title} #[default]'

# Status line with gitmux
set -g status-left ""
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_gitmux}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Enable mouse support (click to select panes, drag to resize, scroll)
set -g mouse on

# Allow passthrough for image support (e.g., pasting images into Claude Code)
set -g allow-passthrough all
set -g set-clipboard on

# Dim text in unfocused panes
set -g window-style 'fg=colour240'
set -g window-active-style 'fg=terminal'

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# A shortcut for clearing buffer history
bind C-k clear-history

# Easy editing of tmux configuration
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"
bind-key M split-window -h "vim ~/.tmux.conf"

# vim-bindings for copying into tmux buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
