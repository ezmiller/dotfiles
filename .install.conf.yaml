- defaults:
    link:
      create: true
      relink: true

- clean: ['~', '~/.config']

- shell:
    - [agents/build.sh, Building agent instruction files]

- link:
    ~/.bash:
    ~/.bashrc:
    ~/.bash_profile:
    ~/.local/bin/pdf2txt.sh:
      path: bin/pdf2txt.sh
    ~/.clojure:
    ~/.direnvrc:
    ~/.emacs.d:
      path: emacs-29.d
    ~/.gitconfig:
    ~/.gitignore_global:
    ~/.gnupg/gpg.conf:
      path: gnupg/gpg.conf
    ~/.gnupg/common.conf:
      path: gnupg/common.conf
    ~/.irbrc:
    ~/.nvm:
    ~/.nvmrc:
    ~/.pyenv:
    ~/.pyenv/plugins/pyenv-virtualenv:
      path: pyenv-virtualenv
      create: false
      relink: false
    ~/.pythonrc:
    ~/qmk_firmware:
    ~/.rbenv:
    ~/.rbenv/plugins/ruby-build:
      path: ruby-build
      create: false
      relink: false
    ~/.shell:
    ~/.spacemacs:
    ~/.spacemacs-private:
    ~/.tmux:
    ~/.tmux.conf: tmux/tmux.conf
    ~/.gitmux.conf: tmux/gitmux.conf
    ~/.vimrc:
    ~/.vim:
    ~/.zsh:
    ~/.zshrc:
    ~/.config/ghostty/config:
      path: ghostty/config
    ~/.config/tmuxinator:
      path: tmuxinator
    # Claude Code config
    ~/.claude/.mcp.json:
      path: .claude/.mcp.json
    ~/.claude/CLAUDE.md:
      path: agents/dist/CLAUDE.md
    # Claude Code skills
    ~/.claude/skills/api-upgrade:
      path: pk-skills/skills/api-upgrade
    ~/.claude/skills/financial-aid-application:
      path: skills/skills/financial-aid-application
    # ECA agent config
    ~/.config/eca/AGENTS.md:
      path: agents/eca.md
    ~/.config/eca/base.md:
      path: agents/base.md
    # ECA skills
    ~/.config/eca/skills/api-upgrade:
      path: pk-skills/skills/api-upgrade
    ~/.config/eca/skills/financial-aid-application:
      path: skills/skills/financial-aid-application

- create:
    - ~/.pyenv/plugins/pyenv-virtualenv
