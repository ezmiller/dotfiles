- defaults:
    link:
      create: true
      relink: true

- clean: ['~', '~/.config']

- link:
    ~/.bash:
    ~/.bashrc:
    ~/.bash_profile:
    ~/.local/bin/pdf2txt.sh:
      path: bin/pdf2txt.sh
    ~/.clojure:
    ~/.direnvrc:
    ~/.emacs.d:
      path: emacs-29.d
    ~/.gitconfig:
    ~/.gitignore_global:
    ~/.gnupg/gpg.conf:
      path: gnupg/gpg.conf
    ~/.gnupg/common.conf:
      path: gnupg/common.conf
    ~/.irbrc:
    ~/.nvm:
    ~/.nvmrc:
    ~/.pyenv:
    ~/.pyenv/plugins/pyenv-virtualenv:
      path: pyenv-virtualenv
      create: false
      relink: false
    ~/.pythonrc:
    ~/qmk_firmware:
    ~/.rbenv:
    ~/.rbenv/plugins/ruby-build:
      path: ruby-build
      create: false
      relink: false
    ~/.shell:
    ~/.spacemacs:
    ~/.spacemacs-private:
    ~/.tmux:
    ~/.tmux.conf: tmux/tmux.conf
    ~/.vimrc:
    ~/.vim:
    ~/.zsh:
    ~/.zshrc:
    ~/.config/ghostty/config:
      path: ghostty/config
    # Claude Code skills
    ~/.claude/skills/api-upgrade:
      path: pk-skills/skills/api-upgrade
    ~/.claude/skills/financial-aid-application:
      path: skills/skills/financial-aid-application
    # ECA skills
    ~/.config/eca/skills/api-upgrade:
      path: pk-skills/skills/api-upgrade
    ~/.config/eca/skills/financial-aid-application:
      path: skills/skills/financial-aid-application

- create:
    - ~/.pyenv/plugins/pyenv-virtualenv
